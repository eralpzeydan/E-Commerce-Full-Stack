spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  cache:
    type: simple

  data:
    redis:
      repositories:
        enabled: false

  rabbitmq:
    dynamic: false
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

management:
  health:
    redis:
      enabled: false
    rabbit:
      enabled: false
